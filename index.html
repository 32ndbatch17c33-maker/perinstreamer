<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#08090d">
    <link class="apple-touch-icon" href="./icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>PERINWATCH | Premium Cinematic Hub (Viewer)</title>
    <style>
        :root {
            /* Immersive Streaming Dark Theme */
            --bg-matte-black: #08090d;
            --bg-card-surface: #12151e;
            --text-pure-white: #ffffff;
            --text-muted-gray: #94a3b8;
            --accent-glow: #38bdf8;
            --glass-border-light: rgba(255, 255, 255, 0.08);
            --iw-pill-bg: rgba(255, 255, 255, 0.07);
            --iw-pill-border: rgba(255, 255, 255, 0.15);
            --danger-red: #f43f5e;
        }

        /* Fluid/Adaptive Base Setup */
        * {
            box-sizing: border-box;
        }

        html, body {
            touch-action: manipulation;
            -webkit-text-size-adjust: 100%;
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-matte-black);
            color: var(--text-pure-white);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 15px 4%;
            padding-left: calc(4% + env(safe-area-inset-left));
            padding-right: calc(4% + env(safe-area-inset-right));
            padding-top: calc(15px + env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(8, 9, 13, 0.98) 70%, rgba(8, 9, 13, 0));
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            gap: 15px;
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .app-title-display {
            font-weight: 900;
            font-size: clamp(18px, 2.5vw, 24px);
            letter-spacing: -1.5px;
            color: var(--text-pure-white);
            text-transform: uppercase;
            user-select: none;
        }

        .nav-controls-group {
            display: flex;
            align-items: center;
            gap: clamp(10px, 2vw, 20px);
            flex-grow: 1;
            justify-content: flex-end;
        }

        .global-search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border-light);
            padding: 10px 18px;
            border-radius: 20px;
            color: white;
            font-size: 13px;
            width: clamp(110px, 15vw, 180px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .global-search-input:focus {
            outline: none;
            width: clamp(140px, 25vw, 250px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-glow);
        }

        .nav-navigation-links {
            display: flex;
            align-items: center;
        }

        .nav-navigation-links button {
            background: transparent;
            color: var(--text-muted-gray);
            border: none;
            font-size: clamp(11px, 1.5vw, 14px);
            font-weight: 600;
            margin-left: clamp(6px, 1.5vw, 15px);
            cursor: pointer;
            transition: color 0.2s;
            white-space: nowrap;
        }

        .nav-navigation-links button:hover, .nav-navigation-links button.active {
            color: var(--text-pure-white);
        }

        /* Adaptive Billboard / Hero Section */
        .hero-video-theater-wrapper {
            position: relative;
            width: 100%;
            height: 70vh;
            min-height: 400px;
            max-height: 800px;
            background: #000;
            overflow: hidden;
            cursor: pointer;
        }

        .hero-cover-photo-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            border: none;
        }

        .hero-video-theater-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg-matte-black) 8%, rgba(8, 9, 13, 0.3) 50%, transparent 90%),
                        linear-gradient(to right, rgba(8, 9, 13, 0.85) 0%, rgba(8, 9, 13, 0.1) 70%, transparent 100%);
            z-index: 2;
        }

        .hero-billboard-content-envelope {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 3;
            width: 100%;
            max-width: 900px;
            padding: 0 calc(4% + env(safe-area-inset-right)) 40px calc(4% + env(safe-area-inset-left));
            box-sizing: border-box;
        }

        .hero-meta-tagline {
            font-size: clamp(9px, 1.2vw, 11px);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-glow);
            margin-bottom: 8px;
        }

        .hero-main-title {
            font-size: clamp(28px, 5vw, 54px);
            font-weight: 900;
            line-height: 1.1;
            margin: 8px 0;
            text-transform: uppercase;
            letter-spacing: -1.5px;
            word-wrap: break-word;
        }

        .hero-metadata-badges-strip {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: clamp(11px, 1.5vw, 13px);
            color: #cbd5e1;
            margin-bottom: 15px;
        }

        .iw-badge {
            background: var(--iw-pill-bg);
            border: 1px solid var(--iw-pill-border);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
        }

        .hero-storyline-synopsis {
            font-size: clamp(13px, 1.8vw, 15px);
            line-height: 1.5;
            color: #cbd5e1;
            margin-bottom: 18px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-cast-crew-credits {
            font-size: 13px;
            color: var(--text-muted-gray);
            margin-bottom: 20px;
        }

        .hero-interactive-action-cluster {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .iw-prime-btn {
            background: white; color: black; border: none; padding: 12px 30px;
            font-size: clamp(12px, 1.5vw, 14px); font-weight: 700; border-radius: 6px; cursor: pointer;
            transition: opacity 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .iw-prime-btn:hover { opacity: 0.9; }

        .iw-secondary-btn {
            background: var(--iw-pill-bg); color: white; border: 1px solid var(--iw-pill-border);
            width: 44px; height: 44px; border-radius: 6px; cursor: pointer;
            font-size: 20px; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        /* Movie Dashboard Panel Adjustments */
        .movie-dashboard-header-panel {
            padding: calc(90px + env(safe-area-inset-top)) calc(4% + env(safe-area-inset-right)) 60px calc(4% + env(safe-area-inset-left));
            background: linear-gradient(to bottom, #11141d, var(--bg-matte-black));
            border-bottom: 1px solid var(--glass-border-light);
            min-height: 100vh;
        }
        .btn-back-nav {
            background: var(--iw-pill-bg); color: white; border: 1px solid var(--iw-pill-border);
            padding: 8px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; margin-bottom: 25px;
        }
        .btn-back-nav:hover { background: rgba(255,255,255,0.15); }

        .dashboard-split-grid {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: clamp(20px, 4vw, 40px);
        }
        
        .dashboard-poster-img {
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            display: block;
            border-radius: 12px;
            border: 1px solid var(--glass-border-light);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .dashboard-player-stage-frame {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Fixed 16:9 Aspect Ratio Canvas */
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--accent-glow);
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
            margin-bottom: 30px;
        }
        .dashboard-player-stage-frame iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
        }

        main { 
            padding: 20px 0 calc(110px + env(safe-area-inset-bottom)) 0; 
            position: relative; 
            z-index: 5; 
        }

        .category-row-wrapper { 
            margin-bottom: 35px; 
            padding: 0 calc(4% + env(safe-area-inset-right)) 0 calc(4% + env(safe-area-inset-left)); 
        }
        
        .row-header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .row-header-actions h3 {
            font-size: clamp(16px, 3vw, 22px);
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* Horizontal Carousel Setup */
        .shelf-horizontal-track {
            display: flex;
            gap: clamp(12px, 2vw, 20px);
            overflow-x: auto;
            padding-bottom: 15px;
            scroll-behavior: smooth;
            align-items: stretch;
            -webkit-overflow-scrolling: touch; /* Butter-smooth scrolling iOS */
        }
        .shelf-horizontal-track::-webkit-scrollbar { height: 6px; }
        .shelf-horizontal-track::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* Highly Adaptive Cards */
        .video-thumbnail-card {
            flex: 0 0 clamp(200px, 35vw, 290px);
            background: #11141d;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s;
            border: 1px solid var(--glass-border-light);
            box-shadow: 0 4px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        .video-thumbnail-card:hover { 
            transform: translateY(-4px) scale(1.02); 
            border-color: var(--accent-glow);
            box-shadow: 0 12px 25px rgba(0, 242, 255, 0.15);
        }

        .thumbnail-image-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            overflow: hidden;
        }
        .thumbnail-image-container img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; border: none;
        }

        .card-metadata-footer {
            padding: 12px 14px;
            background: #0e1017;
            position: relative;
            z-index: 3;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card-metadata-title {
            font-size: clamp(12px, 1.5vw, 14px);
            font-weight: 600;
            color: var(--text-pure-white);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        .card-metadata-subtext {
            font-size: 11px;
            color: var(--text-muted-gray);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .top10-premium-card {
            flex: 0 0 clamp(240px, 45vw, 360px);
            display: flex;
            align-items: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.4s ease;
        }
        .top10-premium-card:hover { transform: scale(1.04); }

        .top10-rank-number {
            font-size: clamp(80px, 15vw, 140px);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -6px;
            margin-right: -10px;
            z-index: 4;
            color: #ffffff; 
            text-shadow: 0px 8px 24px rgba(0, 0, 0, 0.8), 0 0 30px rgba(255,255,255,0.2);
            user-select: none;
        }
        .top10-image-frame {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 8px;
            overflow: hidden;
            z-index: 2;
            position: relative;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 10px 35px rgba(0,0,0,0.6);
        }

        .empty-state-notice { color: var(--text-muted-gray); padding: 30px; text-align: center; width: 100%; font-size: 14px; }

        /* Enhanced Mobile-Responsive Bottom Navigation Ribbon */
        .bottom-shortcuts-ribbon {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: calc(65px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, rgba(8, 9, 13, 1) 85%, rgba(8, 9, 13, 0.95));
            border-top: 1px solid var(--glass-border-light);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 10px;
            gap: clamp(10px, 4vw, 40px);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }
        
        .shortcut-ribbon-btn {
            background: transparent;
            color: var(--text-muted-gray);
            border: none;
            font-size: clamp(11px, 1.8vw, 14px);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            white-space: nowrap;
        }
        .shortcut-ribbon-btn:hover, .shortcut-ribbon-btn.active {
            color: var(--accent-glow);
            background: rgba(56, 189, 248, 0.08);
        }

        /* Fully Adaptive Flyout Panel */
        .types-flyout-panel {
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%) translateY(15px);
            background: var(--bg-card-surface);
            border: 1px solid var(--glass-border-light);
            border-radius: 12px;
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(2, minmax(110px, 140px));
            gap: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .types-flyout-panel.visible { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }

        .types-flyout-item-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border-light);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            text-align: center;
        }
        .types-flyout-item-btn:hover { background: var(--accent-glow); color: black; }
        
        .grid-dashboard-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(clamp(140px, 22vw, 280px), 1fr)); 
            gap: clamp(12px, 2.5vw, 25px); 
        }

        /* BREAKPOINTS & ORIENTATION RESPONSIVENESS */
        @media(max-width: 900px) {
            .dashboard-split-grid { 
                grid-template-columns: 1fr; 
                gap: 25px; 
            }
            .dashboard-poster-img {
                max-width: 240px;
            }
        }

        @media (max-width: 650px) {
            header { 
                padding: 12px 12px; 
                padding-top: calc(12px + env(safe-area-inset-top));
                gap: 8px; 
            }
            .hero-video-theater-wrapper {
                height: 55vh;
                min-height: 320px;
            }
            .hero-billboard-content-envelope {
                padding-bottom: 25px;
            }
            .global-search-input { 
                padding: 8px 12px; 
            }
        }

        /* Low height devices / Landscape Phones optimization */
        @media (orientation: landscape) and (max-height: 520px) {
            .hero-video-theater-wrapper {
                height: 85vh;
                min-height: 260px;
            }
            .hero-storyline-synopsis {
                display: none; /* Auto-hide long descriptions on landscape mobile to ensure screen space integrity */
            }
            .hero-billboard-content-envelope {
                padding-bottom: 15px;
            }
            .movie-dashboard-header-panel {
                padding-top: calc(65px + env(safe-area-inset-top));
            }
            .dashboard-split-grid {
                grid-template-columns: 200px 1fr;
            }
            .dashboard-poster-img {
                max-width: 180px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-wrapper">
            <span id="appLogoText" class="app-title-display" style="cursor:pointer;" onclick="switchView('browse')">PERINWATCH</span>
        </div>
        <div class="nav-controls-group">
            <input type="text" id="globalSearch" class="global-search-input" placeholder="Search entries..." oninput="searchCatalogEngine()">
            <div class="nav-navigation-links">
                <button id="tabBrowse" class="active" onclick="switchView('browse')">Home</button>
                <button id="tabMyList" onclick="switchView('mylist')">My Stuff</button>
                <button id="tabHistory" onclick="switchView('history')">History Logs</button>
            </div>
        </div>
    </header>

    <div id="movieDashboardPage" style="display: none;"></div>

    <div id="mainBrowseViewRegion">
        <div id="heroSpotlightRegion"></div>
        <main>
            <div id="browseView"><div id="rowsContainer"></div></div>

            <div id="dynamicFilterView" style="display: none; padding: 0 4%;">
                <div class="category-row-wrapper">
                    <div class="row-header-actions" style="margin-bottom: 25px;">
                        <h3 id="dynamicFilterHeadingTitle">Filtered Presentation Hub</h3>
                        <button class="btn-back-nav" style="margin-bottom:0;" onclick="switchView('browse')">Close Filter View ×</button>
                    </div>
                    <div class="grid-dashboard-container" id="dynamicFilterGridTrack"></div>
                </div>
            </div>

            <div id="myListView" style="display: none; padding: 0 4%;">
                <div class="category-row-wrapper">
                    <div class="row-header-actions"><h3>My Favorites List</h3></div>
                    <div class="shelf-horizontal-track" id="watchlistTrack"></div>
                </div>
            </div>

            <div id="historyView" style="display: none; padding: 0 4%;">
                <div class="category-row-wrapper">
                    <div class="row-header-actions">
                        <h3>Recent History Tracking</h3>
                        <button style="background: rgba(244, 63, 94, 0.1); color: var(--danger-red); border: 1px solid rgba(244, 63, 94, 0.2); padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;" onclick="clearStreamLogs()">Wipe logs</button>
                    </div>
                    <div class="shelf-horizontal-track" id="historyTrack"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="bottom-shortcuts-ribbon">
        <button id="shortcutBtnMovies" class="shortcut-ribbon-btn" onclick="triggerRibbonContentFilter('Movies')">Movies</button>
        <button id="shortcutBtnShows" class="shortcut-ribbon-btn" onclick="triggerRibbonContentFilter('Shows')">TV Shows</button>
        <div style="position: relative;">
            <button id="shortcutBtnGenres" class="shortcut-ribbon-btn" onclick="toggleTypesFlyoutPanel(event)">Genres ↓</button>
            <div class="types-flyout-panel" id="ribbonFlyoutPanel"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://uplb-22260-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let activeGlobalShelfCategories = [];
        let applicationVideoDatabase = [];

        let availableMovieTypesList = ["Action", "Anime", "Comedies", "Documentaries", "Dramas", "Fantasy", "Filipino", "Hollywood"];
        let userFavoritesArrayIds = JSON.parse(localStorage.getItem('pw_favs')) || [];
        let userStreamingHistoryArrayIds = JSON.parse(localStorage.getItem('pw_hist')) || [];
        let catalogRunningSearchFilterQuery = "";

        // Strictly Prevent Zoom Interactions via JavaScript Events
        document.addEventListener('gesturestart', function (e) {
            e.preventDefault();
        });
        document.addEventListener('touchmove', function (e) {
            if (e.scale && e.scale !== 1) { 
                e.preventDefault(); 
            }
        }, { passive: false });

        let finalTouchTimeRecord = 0;
        document.addEventListener('touchend', function (e) {
            const now = (new Date()).getTime();
            if (now - finalTouchTimeRecord <= 300) {
                e.preventDefault();
            }
            finalTouchTimeRecord = now;
        }, false);

        // Establish Real-Time Observers for Database Sync
        onValue(ref(db, 'activeGlobalShelfCategories'), (snapshot) => {
            if(snapshot.exists()) {
                const data = snapshot.val();
                activeGlobalShelfCategories = Array.isArray(data) ? data : Object.values(data);
            }
            refreshUIComponents();
        });

        onValue(ref(db, 'applicationVideoDatabase'), (snapshot) => {
            if(snapshot.exists()) {
                const data = snapshot.val();
                applicationVideoDatabase = Array.isArray(data) ? data : Object.values(data);
            }
            refreshUIComponents();
        });

        function refreshUIComponents() {
            buildTypesRibbonPanelInterface();
            renderHeroFeaturedSpotlight();
            renderMainRowsCatalogLayout();
        }

        function switchView(targetViewId) {
            document.getElementById('movieDashboardPage').style.display = 'none';
            document.getElementById('mainBrowseViewRegion').style.display = 'block';

            document.getElementById('browseView').style.display = targetViewId === 'browse' ? 'block' : 'none';
            document.getElementById('dynamicFilterView').style.display = targetViewId === 'filter' ? 'block' : 'none';
            document.getElementById('myListView').style.display = targetViewId === 'mylist' ? 'block' : 'none';
            document.getElementById('historyView').style.display = targetViewId === 'history' ? 'block' : 'none';

            document.querySelectorAll('.nav-navigation-links button').forEach(b => b.classList.remove('active'));
            if(targetViewId === 'browse') document.getElementById('tabBrowse').classList.add('active');
            if(targetViewId === 'mylist') { document.getElementById('tabMyList').classList.add('active'); renderFavoritesWatchlistTrack(); }
            if(targetViewId === 'history') { document.getElementById('tabHistory').classList.add('active'); renderHistoryLogTrack(); }
        }

        function searchCatalogEngine() {
            catalogRunningSearchFilterQuery = document.getElementById('globalSearch').value.toLowerCase().trim();
            renderMainRowsCatalogLayout();
        }

        function resolveEmbedUrlEngineParser(url) {
            if (!url) return "";
            const ytMatch = url.match(/^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/);
            if (ytMatch && ytMatch[2].length === 11) {
                return `https://www.youtube.com/embed/${ytMatch[2]}?autoplay=0&rel=0&controls=1&showinfo=1&iv_load_policy=1&fs=1`;
            }
            return url;
        }

        function openMovieDashboardView(id) {
            const asset = applicationVideoDatabase.find(v => v.id == id);
            if (!asset) return;
            if(!userStreamingHistoryArrayIds.includes(asset.id)) {
                userStreamingHistoryArrayIds.unshift(asset.id);
                localStorage.setItem('pw_hist', JSON.stringify(userStreamingHistoryArrayIds));
            }
            const cleanVideoUrl = resolveEmbedUrlEngineParser(asset.streamUrl);
            const fallbackPhoto = "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1200";

            let typesBadgesHtml = "";
            (asset.types || []).forEach(t => {
                typesBadgesHtml += `<span class="iw-badge" style="background:rgba(56, 189, 248, 0.08); border-color:rgba(56,189,248,0.3); color:#38bdf8;">${t}</span>`;
            });

            document.getElementById('mainBrowseViewRegion').style.display = 'none';
            const dashboardPage = document.getElementById('movieDashboardPage');
            dashboardPage.innerHTML = `
                <div class="movie-dashboard-header-panel">
                    <button class="btn-back-nav" onclick="closeMovieDashboardView()">← Back to Catalog Feed</button>
                    <div class="dashboard-split-grid">
                        <div>
                            <img class="dashboard-poster-img" src="${asset.photoUrl || fallbackPhoto}" alt="Cover">
                            <h2 style="margin:20px 0 10px 0; font-size:28px;">${asset.title}</h2>
                            <div style="display:flex; flex-wrap:wrap; gap:10px; font-size:13px; color:var(--text-muted-gray); margin-bottom:15px; align-items:center;">
                                <span>${asset.year}</span><span>•</span><span>${asset.ageRating || 'All'}</span><span>•</span><span>${asset.format || 'Feature'}</span>
                            </div>
                            <div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:20px;">${typesBadgesHtml}</div>
                            <button class="iw-prime-btn" style="width:100%; text-align:center;" id="btnFavDash" onclick="toggleFavoritesActionFromDashboard(${asset.id})">
                                ${userFavoritesArrayIds.includes(asset.id) ? '✓ Removed from Watchlist' : '+ Add to Watchlist'}
                            </button>
                        </div>
                        <div>
                            <div class="dashboard-player-stage-frame">
                                <iframe src="${cleanVideoUrl}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                            </div>
                            <h4 style="margin:0 0 10px 0; font-size:14px; text-transform:uppercase; color:var(--accent-glow);">Synopsis</h4>
                            <p style="font-size:15px; line-height:1.6; color:#cbd5e1; margin:0 0 20px 0;">${asset.desc || 'No plot overview available.'}</p>
                            <div style="font-size:13px; color:var(--text-muted-gray);">
                                <strong>Starring:</strong> ${asset.cast || 'N/A'}<br>
                                <strong style="margin-top:5px; display:inline-block;">Studio/Crew:</strong> ${asset.crew || 'N/A'}
                            </div>
                        </div>
                    </div>
                </div>`;
            dashboardPage.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeMovieDashboardView() {
            document.getElementById('movieDashboardPage').style.display = 'none';
            document.getElementById('mainBrowseViewRegion').style.display = 'block';
        }

        function toggleFavoritesActionFromDashboard(id) {
            toggleFavoritesAction(id);
            const btn = document.getElementById('btnFavDash');
            if(btn) btn.innerText = userFavoritesArrayIds.includes(id) ? '✓ Removed from Watchlist' : '+ Add to Watchlist';
        }

        function toggleFavoritesAction(id) {
            if(userFavoritesArrayIds.includes(id)) {
                userFavoritesArrayIds = userFavoritesArrayIds.filter(favId => favId !== id);
            } else {
                userFavoritesArrayIds.push(id);
            }
            localStorage.setItem('pw_favs', JSON.stringify(userFavoritesArrayIds));
            renderMainRowsCatalogLayout();
            renderFavoritesWatchlistTrack();
        }

        // Modified strictly to pass event to inner buttons to preserve original stopPropagation mapping requirements
        function renderHeroFeaturedSpotlight() {
            const wrapper = document.getElementById('heroSpotlightRegion');
            wrapper.innerHTML = "";
            const featuredItem = applicationVideoDatabase.find(v => v.isFeatured === true);
            if (!featuredItem) return;

            const isFav = userFavoritesArrayIds.includes(featuredItem.id);
            const stageSection = document.createElement('div');
            stageSection.className = "hero-video-theater-wrapper";
            stageSection.onclick = () => openMovieDashboardView(featuredItem.id);

            const fallbackPhoto = "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=1200";
            stageSection.innerHTML = `<img class="hero-cover-photo-canvas" src="${featuredItem.photoUrl || fallbackPhoto}" alt="Spotlight">`;

            const envelope = document.createElement('div');
            envelope.className = "hero-billboard-content-envelope";
            envelope.innerHTML = `
                <div class="hero-meta-tagline">★ Premium Featured Spotlight</div>
                <h1 class="hero-main-title">${featuredItem.title}</h1>
                <div class="hero-metadata-badges-strip">
                    <span class="iw-badge">${featuredItem.year}</span>
                    <span class="iw-badge">${featuredItem.ageRating || '13+'}</span>
                    <span>${featuredItem.format || 'Movies'}</span>
                </div>
                <p class="hero-storyline-synopsis">${featuredItem.desc || ''}</p>
                <div class="hero-interactive-action-cluster">
                    <button class="iw-prime-btn" onclick="event.stopPropagation(); openMovieDashboardView(${featuredItem.id})">► Open Movie Dashboard</button>
                    <button class="iw-secondary-btn" onclick="event.stopPropagation(); toggleFavoritesAction(${featuredItem.id})">${isFav ? '✓' : '+'}</button>
                </div>`;
            stageSection.appendChild(envelope);
            wrapper.appendChild(stageSection);
        }

        function createPosterLayoutCard(item, index, isTop10Mode) {
            const fallbackPhoto = "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=800";
            const visualSourceImage = item.photoUrl || fallbackPhoto;
            const itemRank = item.rank ? Number(item.rank) : index + 1;

            if (isTop10Mode) {
                return `
                    <div class="top10-premium-card" onclick="openMovieDashboardView(${item.id})">
                        <div class="top10-rank-number">${itemRank}</div>
                        <div class="top10-image-frame">
                            <img src="${visualSourceImage}" style="width:100%; height:100%; object-fit:cover;" alt="">
                        </div>
                    </div>`;
            } else {
                const isFav = userFavoritesArrayIds.includes(item.id);
                return `
                    <div class="video-thumbnail-card" onclick="openMovieDashboardView(${item.id})">
                        <div class="thumbnail-image-container">
                            <img src="${visualSourceImage}" alt="">
                        </div>
                        <div class="card-metadata-footer">
                            <div class="card-metadata-title">${item.title}</div>
                            <div class="card-metadata-subtext">
                                <span>${item.year}</span><span>•</span><span>${item.ageRating || 'G'}</span>
                                <span style="margin-left:auto; color:${isFav ? '#38bdf8' : 'white'}; font-weight:bold;" onclick="event.stopPropagation(); toggleFavoritesAction(${item.id})">
                                    ${isFav ? '✓' : '+ List'}
                                </span>
                            </div>
                        </div>
                    </div>`;
            }
        }

        function renderMainRowsCatalogLayout() {
            const container = document.getElementById('rowsContainer');
            container.innerHTML = "";

            activeGlobalShelfCategories.forEach(categoryRow => {
                const rowName = typeof categoryRow === 'object' ? categoryRow.name : categoryRow;
                const isTop10Row = rowName.toLowerCase().includes('top 10');

                let matchedAssets = applicationVideoDatabase.filter(v => v.categories && v.categories.includes(rowName));
                if (isTop10Row) {
                    matchedAssets = matchedAssets.filter(v => v.rank && Number(v.rank) >= 1 && Number(v.rank) <= 10)
                                                 .sort((a, b) => Number(a.rank) - Number(b.rank));
                }

                if (catalogRunningSearchFilterQuery) {
                    matchedAssets = matchedAssets.filter(v => 
                        v.title.toLowerCase().includes(catalogRunningSearchFilterQuery) ||
                        (v.types && v.types.some(t => t.toLowerCase().includes(catalogRunningSearchFilterQuery)))
                    );
                }

                if (matchedAssets.length === 0 && catalogRunningSearchFilterQuery) return;

                const section = document.createElement('div');
                section.className = "category-row-wrapper";
                section.innerHTML = `<div class="row-header-actions"><h3>${rowName}</h3></div>`;

                const track = document.createElement('div');
                track.className = "shelf-horizontal-track";

                if (matchedAssets.length === 0) {
                    track.innerHTML = `<div class="empty-state-notice">This row context is currently empty.</div>`;
                } else {
                    matchedAssets.forEach((item, idx) => {
                        track.innerHTML += createPosterLayoutCard(item, idx, isTop10Row);
                    });
                }
                section.appendChild(track);
                container.appendChild(section);
            });
        }

        function triggerRibbonContentFilter(mode, specificValue = "") {
            closeMovieDashboardView();
            document.querySelectorAll('.bottom-shortcuts-ribbon button').forEach(b => b.classList.remove('active'));
            document.getElementById('shortcutBtnMovies').classList.toggle('active', mode === 'Movies');
            document.getElementById('shortcutBtnShows').classList.toggle('active', mode === 'Shows');

            switchView('filter');
            const targetGridTrack = document.getElementById('dynamicFilterGridTrack');
            const targetHeading = document.getElementById('dynamicFilterHeadingTitle');
            targetGridTrack.innerHTML = '';

            let isolatedMatches = [];
            if (mode === 'Movies') {
                targetHeading.innerText = "Browsing Catalog: Premium Feature Movies";
                isolatedMatches = applicationVideoDatabase.filter(v => v.format === 'Movies');
            } else if (mode === 'Shows') {
                targetHeading.innerText = "Browsing Catalog: Premium Series & TV Shows";
                isolatedMatches = applicationVideoDatabase.filter(v => v.format === 'Shows');
            } else if (mode === 'Type') {
                targetHeading.innerText = `Browsing Genre: ${specificValue}`;
                isolatedMatches = applicationVideoDatabase.filter(v => v.types && v.types.includes(specificValue));
                document.getElementById('shortcutBtnGenres').classList.add('active');
            }

            if (isolatedMatches.length === 0) {
                targetGridTrack.innerHTML = '<div class="empty-state-notice">No program entries match the selection parameters.</div>';
            } else {
                isolatedMatches.forEach((item, idx) => {
                    targetGridTrack.innerHTML += createPosterLayoutCard(item, idx, false);
                });
            }
        }

        function toggleTypesFlyoutPanel(e) {
            e.stopPropagation();
            const panel = document.getElementById('ribbonFlyoutPanel');
            panel.classList.toggle('visible');
        }

        function buildTypesRibbonPanelInterface() {
            const panel = document.getElementById('ribbonFlyoutPanel');
            panel.innerHTML = '';
            availableMovieTypesList.forEach(t => {
                const btn = document.createElement('button');
                btn.className = "types-flyout-item-btn";
                btn.innerText = t;
                btn.onclick = () => { panel.classList.remove('visible'); triggerRibbonContentFilter('Type', t); };
                panel.appendChild(btn);
            });
        }

        function renderFavoritesWatchlistTrack() {
            const track = document.getElementById('watchlistTrack');
            track.innerHTML = "";
            const matched = applicationVideoDatabase.filter(v => userFavoritesArrayIds.includes(v.id));
            if(matched.length === 0) {
                track.innerHTML = `<div class="empty-state-notice">Your Watchlist is empty. Add titles from home feed entries.</div>`;
                return;
            }
            matched.forEach((item, idx) => { track.innerHTML += createPosterLayoutCard(item, idx, false); });
        }

        function renderHistoryLogTrack() {
            const track = document.getElementById('historyTrack');
            track.innerHTML = "";
            const matched = userStreamingHistoryArrayIds.map(id => applicationVideoDatabase.find(v => v.id == id)).filter(Boolean);
            if(matched.length === 0) {
                track.innerHTML = `<div class="empty-state-notice">No recently watched logs detected on this deployment server.</div>`;
                return;
            }
            matched.forEach((item, idx) => { track.innerHTML += createPosterLayoutCard(item, idx, false); });
        }

        function clearStreamLogs() {
            userStreamingHistoryArrayIds = [];
            localStorage.removeItem('pw_hist');
            renderHistoryLogTrack();
        }

        document.addEventListener('click', () => { document.getElementById('ribbonFlyoutPanel').classList.remove('visible'); });

        window.switchView = switchView;
        window.searchCatalogEngine = searchCatalogEngine;
        window.openMovieDashboardView = openMovieDashboardView;
        window.closeMovieDashboardView = closeMovieDashboardView;
        window.toggleFavoritesActionFromDashboard = toggleFavoritesActionFromDashboard;
        window.toggleFavoritesAction = toggleFavoritesAction;
        window.clearStreamLogs = clearStreamLogs;
        window.triggerRibbonContentFilter = triggerRibbonContentFilter;
        window.toggleTypesFlyoutPanel = toggleTypesFlyoutPanel;
    </script>
</body>
</html>
